<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="h9T_i7FO3Czv2jhNrE-sMa-S_QD1qyWcAZKQwY5NGTM" />
    
    <title>Selim Koyuncu</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 60px;
            margin: 0;
            letter-spacing: 2px;
        }

        p {
            font-size: 20px;
            opacity: 0.8;
            max-width: 600px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #f59e0b;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #fbbf24;
        }

        .sections {
            padding: 50px 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            margin: 15px auto;
            padding: 20px;
            border-radius: 12px;
            max-width: 600px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>SELİM KOYUNCU</h1>
        <p>Amasya’nın köyleri, tarihi yerleri, doğası ve kültürü artık tek bir platformda.</p>
        <a class="btn" href="#kesfet">Keşfet</a>
    </div>

    <div class="sections" id="kesfet">

        <div class="card">
            🏛️ Amasya Tarihi Yerler
        </div>

        <div class="card">
            🌄 Köy Köy Keşif
        </div>

        <div class="card">
            🎥 Drone & Tanıtım Videoları
        </div>

        <div class="card">
            📰 Yerel Haberler
        </div>

        <div class="card">
            📸 Fotoğraf Galerisi
        </div>

    </div>

</body>
</html>
