<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selim Koyuncu | Her Mevsim Amasya</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        /* Tam Ekran Arka Plan */
        .hero {
            height: 100vh;
            width: 100vw;
            background: url('BURAYA_RESIM_LINKINIZI_YAZIN.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Buzlu Cam Efektli Kart */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 80px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #ffffff;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .social-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #ffffff;
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .social-link:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="card">
        <h1>HER MEVSİM AMASYA</h1>
        <p>Selim Koyuncu tarafından yönetilen dijital proje hazırlık aşamasında.</p>
        <a href="https://www.instagram.com/hermevsimamasya" class="social-link" target="_blank">Instagram'da Bizi Takip Edin</a>
    </div>
</div>

</body>
</html>
