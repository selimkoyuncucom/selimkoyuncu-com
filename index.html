<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #333; }
        #login-screen { background: white; padding: 20px; border-radius: 8px; }
        #panel-content { display: none; width: 100%; height: 100vh; }
    </style>
</head>
<body>

    <div id="login-screen">
        <input type="password" id="sifre" placeholder="Şifre">
        <button onclick="kontrolEt()">Giriş Yap</button>
    </div>

    <div id="panel-content">
        <iframe src="https://script.google.com/macros/s/AKfycbyR7MllZlGUg0nKGIxaRogH-I0C75lzSsXdNqGEGqWUqKgZo_SItcdgWUOHOlW3wjBuRw/exec" width="100%" height="45%"></iframe>
        <iframe src="https://script.google.com/macros/s/AKfycbyTZtwIfQzGyQ-aqXazRD29aO-mATrOK-vdg5RSbQ4_rg0CEXX32-Hc2ah0L0xscF3w/exec" width="100%" height="45%"></iframe>
    </div>

    <script>
        function kontrolEt() {
            var girilenSifre = document.getElementById("sifre").value.trim();
            if (girilenSifre === "224770506") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("panel-content").style.display = "block";
            } else {
                alert("Hatalı Şifre!");
            }
        }
    </script>
</body>
</html>
