<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="google-site-verification" content="h9T_i7FO3Czv2jhNrE-sMa-S_QD1qyWcAZKQwY5NGTM" />

    <title>Selim Koyuncu | Her Mevsim Amasya</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0b1220;
            color: white;
        }

        /* HERO */
        .hero {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
        }

        .hero-content {
            position: relative;
            text-align: center;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 60px;
            letter-spacing: 3px;
        }

        .hero-content p {
            margin-top: 10px;
            font-size: 18px;
            opacity: 0.85;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #f59e0b;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        /* SECTIONS */
        .container {
            padding: 60px 20px;
            max-width: 1100px;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
        }

        .title {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

    </style>
</head>

<body>

    <!-- HERO -->
    <div class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
            <h1>SELİM KOYUNCU</h1>
            <p>Amasya’nın köyleri, tarihi, doğası ve haberleri tek platformda</p>
            <a class="btn" href="#icerik">Keşfet</a>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="container" id="icerik">

        <div class="title">Amasya Dijital Rehber</div>

        <div class="grid">

            <div class="card">🏛️ Tarihi Yerler</div>
            <div class="card">🌄 Köyler</div>
            <div class="card">🎥 Drone Videoları</div>
            <div class="card">📰 Haberler</div>
            <div class="card">📸 Fotoğraf Galerisi</div>
            <div class="card">🗺️ Harita ile Keşfet</div>

        </div>
    </div>
    <!-- Footer -->
    <footer style="text-align: center; padding: 20px; font-size: 12px; opacity: 0.5;">
        <p>© 2026 Selim Koyuncu | <a href="/admin/panel.html" style="color: white; text-decoration: none;">Admin</a></p>
    </footer>

</body>
</html>

</body>
</html>
