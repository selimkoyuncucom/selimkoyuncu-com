<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Selim Koyuncu</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f4; }
        #login-screen { margin-top: 100px; background: white; padding: 30px; display: inline-block; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #panel-content { display: none; }
        button { padding: 15px 30px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 18px; }
        iframe { border: none; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- Giriş Ekranı -->
    <div id="login-screen">
        <h2>Admin Girişi</h2>
        <button onclick="girisYap()">Sistemi Başlat</button>
    </div>

    <!-- Panel İçeriği -->
    <div id="panel-content">
        <h1>Yönetim Paneli</h1>
        
        <h2>💰 Finans Sistemi</h2>
        <iframe src="https://script.google.com/macros/s/AKfycbyR7MllZlGUg0nKGIxaRogH-I0C75lzSsXdNqGEGqWUqKgZo_SItcdgWUOHOlW3wjBuRw/exec" width="100%" height="500"></iframe>

        <h2>📅 Organizasyon</h2>
        <iframe src="https://script.google.com/macros/s/AKfycbyTZtwIfQzGyQ-aqXazRD29aO-mATrOK-vdg5RSbQ4_rg0CEXX32-Hc2ah0L0xscF3w/exec" width="100%" height="500"></iframe>
        
        <br><br>
        <button onclick="location.reload()" style="background-color: #dc3545;">Çıkış Yap</button>
    </div>

    <script>
        function girisYap() {
            // Şifre kontrolü olmadan direkt açılması için
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("panel-content").style.display = "block";
        }
    </script>
</body>
</html>
