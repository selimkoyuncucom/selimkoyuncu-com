<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Her Mevsim Amasya | Selim Koyuncu</title>
    <style>
        /* Modern ve temiz görünüm */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .container {
            height: 100vh;
            width: 100vw;
            /* Arka plan resmini buraya tanımlıyoruz */
            background-image: url('http://googleusercontent.com/image_generation_content/299');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* Görselin üzerini hafif karartarak yazının okunmasını sağlıyoruz */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); 
        }

        .content {
            z-index: 1;
            color: #fff;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.5rem;
            margin-top: 10px;
            font-weight: 300;
        }

        .btn {
            margin-top: 30px;
            padding: 15px 35px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid #fff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="overlay"></div>
    <div class="content">
        <h1>HER MEVSİM AMASYA</h1>
        <p>Selim Koyuncu | Çok Yakında</p>
        <a href="https://www.instagram.com/her_mevsim_amasya/" class="btn" target="_blank">Instagram'ı Ziyaret Et</a>
    </div>
</div>

</body>
</html>
