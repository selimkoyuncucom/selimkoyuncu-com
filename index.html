<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Her Mevsim Amasya | Selim Koyuncu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400&display=swap');

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; }

        .hero {
            height: 100vh;
            width: 100vw;
            /* Yüksek kaliteli Amasya görseli */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('http://googleusercontent.com/image_collection/image_retrieval/9192018491884921857_0');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            text-align: center;
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .sub-text {
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .btn {
            margin-top: 40px;
            padding: 15px 40px;
            border: 1px solid white;
            color: white;
            text-decoration: none;
            font-weight: 300;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="brand-name">Her Mevsim Amasya</div>
    <div class="sub-text">Selim Koyuncu | Dijital Yayın Platformu</div>
    <a href="https://www.instagram.com/her_mevsim_amasya/" class="btn" target="_blank">Projeyi Keşfet</a>
</div>

</body>
</html>
