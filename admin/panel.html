<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Selim Koyuncu</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #login-screen { margin-top: 100px; }
        #panel-content { display: none; }
        input { padding: 10px; margin: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- Şifre Giriş Ekranı -->
    <div id="login-screen">
        <h2>Admin Girişi</h2>
        <input type="password" id="sifre" placeholder="224770506">
        <button onclick="kontrolEt()">Giriş Yap</button>
    </div>

    <!-- Panel İçeriği (Girişten sonra açılacak) -->
    <div id="panel-content">
        <h1>Yönetim Paneli</h1>
        
        <h2>💰 Finans Sistemi</h2>
        <iframe src="https://script.google.com/macros/s/AKfycbyR7MllZlGUg0nKGIxaRogH-I0C75lzSsXdNqGEGqWUqKgZo_SItcdgWUOHOlW3wjBuRw/exec" width="100%" height="500"></iframe>

        <h2>📅 Organizasyon</h2>
        <iframe src="https://script.google.com/macros/s/AKfycbyTZtwIfQzGyQ-aqXazRD29aO-mATrOK-vdg5RSbQ4_rg0CEXX32-Hc2ah0L0xscF3w/exec" width="100%" height="500"></iframe>
        
        <br>
        <button onclick="location.reload()">Çıkış Yap</button>
    </div>

    <script>
        function kontrolEt() {
            var girilenSifre = document.getElementById("sifre").value;
            // Buradaki şifreyi kendi belirlediğinle değiştir
            if (girilenSifre === "BURAYA_SIFRENIZI_YAZIN") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("panel-content").style.display = "block";
            } else {
                alert("Hatalı Şifre!");
            }
        }
    </script>
</body>
</html>
