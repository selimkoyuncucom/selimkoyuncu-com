<!DOCTYPE html>
<html lang="tr">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selim Koyuncu | Yönetim Paneli</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<script>
// Giriş kontrolü
if(localStorage.getItem("login") !== "ok"){
    window.location.href = "login.html";
}
</script>

<div class="sidebar">

    <div class="logo">
        Selim Koyuncu
    </div>

    <div class="menu">

        <a href="#" onclick="sayfa('dashboard.html');return false;">🏠 Dashboard</a>

        <a href="#" onclick="sayfa('finans.html');return false;">💰 Finans</a>

        <a href="#" onclick="sayfa('organizasyon.html');return false;">📅 Organizasyon</a>

    </div>

</div>

<div class="content">

    <div class="header">

        <h2>Yönetim Paneli</h2>

        <button class="logout" onclick="cikis()">
            Çıkış Yap
        </button>

    </div>

    <iframe id="icerik" src="dashboard.html"></iframe>

</div>

<script>

function sayfa(link){

    document.getElementById("icerik").src = link;

}

function cikis(){

    localStorage.removeItem("login");

    window.location.href="login.html";

}

</script>
