<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yönetim Paneli</title>

<style>

body{

margin:0;

font-family:Arial;

background:#f1f5f9;

}

header{

background:#0f172a;

color:white;

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

}

button{

padding:10px 20px;

cursor:pointer;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:20px;

padding:30px;

}

.card{

background:white;

border-radius:12px;

padding:20px;

box-shadow:0 0 10px rgba(0,0,0,.1);

}

iframe{

width:100%;

height:500px;

border:none;

}

</style>

</head>

<body>

<script>

if(localStorage.getItem("login")!="ok"){

location.href="login.html";

}

</script>

<header>

<h2>Selim Koyuncu Yönetim Paneli</h2>

<button onclick="cikis()">Çıkış</button>

</header>

<div class="cards">

<div class="card">

<h3>💰 Finans Sistemi</h3>

<iframe src="https://script.google.com/macros/s/AKfycbyR7MllZlGUg0nKGIxaRogH-I0C75lzSsXdNqGEGqWUqKgZo_SItcdgWUOHOlW3wjBuRw/exec"></iframe>

</div>

<div class="card">

<h3>📅 Organizasyon</h3>

<iframe src="https://script.google.com/macros/s/AKfycbyTZtwIfQzGyQ-aqXazRD29aO-mATrOK-vdg5RSbQ4_rg0CEXX32-Hc2ah0L0xscF3w/exec"></iframe>

</div>

</div>

<script>

function cikis(){

localStorage.removeItem("login");

location.href="login.html";

}

</script>

</body>

</html>
