<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Giriş</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #f59e0b;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #fbbf24;
        }

        .error {
            color: red;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Admin Giriş</h2>

    <input type="text" id="user" placeholder="Kullanıcı adı">
    <input type="password" id="pass" placeholder="Şifre">

    <button onclick="login()">Giriş Yap</button>

    <div class="error" id="error">Hatalı giriş</div>
</div>

<script>
function login() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    if (user === "admin" && pass === "1234") {
        window.location.href = "panel.html";
    } else {
        document.getElementById("error").style.display = "block";
    }
}
</script>

</body>
</html>
<!-- login.html için temel mantık -->
<input type="password" id="sifre" placeholder="Şifrenizi Girin">
<button onclick="girisYap()">Giriş</button>

<script>
function girisYap() {
    var sifre = document.getElementById("sifre").value;
    if (sifre == "SizinBelirlediginizSifre") { // Burayı değiştirin
        window.location.href = "panel.html";
    } else {
        alert("Hatalı Şifre!");
    }
}
</script>
