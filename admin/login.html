<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Giriş</title>

<style>

body{

margin:0;

background:#0f172a;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

font-family:Arial;

}

.box{

background:#1e293b;

padding:35px;

border-radius:12px;

width:340px;

color:white;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:8px;

}

button{

width:100%;

padding:12px;

background:#f59e0b;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#fbbf24;

}

</style>

</head>

<body>

<div class="box">

<h2>Yönetim Paneli</h2>

<input id="user" placeholder="Kullanıcı Adı">

<input type="password" id="pass" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;

if(u=="admin" && p=="224770506"){

localStorage.setItem("login","ok");

location.href="panel.html";

}else{

alert("Kullanıcı adı veya şifre hatalı.");

}

}

</script>

</body>
</html>
